# ─── wrangler.toml ────────────────────────────────────────────────────────────
# Single D1 database — freshways-products now owns products + history tables.
# The freshways-history database and its binding have been removed.
# ─────────────────────────────────────────────────────────────────────────────
name = "freshcalcu"
main = "src/worker.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[[d1_databases]]
binding  = "DB"
database_name = "freshways-products"
database_id   = "b4eb6148-3613-4545-9eac-0796ed54a3dd"
